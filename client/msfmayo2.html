<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>&hearts; MSF &hearts;</title>

    <link rel= "stylesheet" href="msf.css" />
</head>

<body>
    <section class="front-page">
        <div class="front-overlay"></div>
        <div class=" "front-content>
            <!-- this div class should contain logo pic. & descriptive text -->
            <img src="../images/logo3.png" alt = "MSF logo" class="front-logo">
            
            <h1 class="front-title"> Movie Super Finder</h1>
            <p class=" scroll-down">Scrolla ner</p>
        </div>
    </section>

        
    <section class="home-page">
        <header class="topbar">
                <div class="small-logo">
                    <img src="logo3.png" alt=" MSF logo">
                </div>

                <nav class ="nav-links">
                    <a href="#"> Hem </a> 
                    <a href="#"> Filmer</a>
                    <a href ="#"> Nyheter</a>
                </nav>
    </header>

    <main class="content">
        <section class = "movie-row-section">
            <h2> Populärt just nu</h2>
            <div class="movie-row" > 
                    <div class="movie-card"
                    data-title="Interstellar"
                    data-year="2014"
                    data-genre ="Sci-fi / Drama"
                    data-desc = "Ett team reser genom ett maskhål i rymden för att hitta mänsklighetens framtida hem."
                    data-img="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">
                    <img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg" alt=" Interstellar">
                     <span> Interstellar </span>
                    </div>

                    <div class="movie-card"
                    data-title="Inception"
                    data-year="2010"
                    data-gengre="Sci-fi / Thriller"
                    data-desc="En tjuv som stjäl hemligheter genom drömmar får sitt farligaste uppdrag hittils."
                    data-img="https://image.tmdb.org/t/p/w500/edv5CZvWj09upOsy2Y6IwDhK8bt.jpg"> 
                    <img src="https://image.tmdb.org/t/p/w500/edv5CZvWj09upOsy2Y6IwDhK8bt.jpg" alt="Inception">
                     <span> Inception </span>
                    </div>

                    <div class="movie-card"
                    data-title="The Batman"
                    data-year="2022"
                    data-gengre="Action / Crime"
                    data-desc="Batman undersöker korruption i Gotham medan en seriemördare terroriserar staden."
                    data-img="https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg"> 
                    <img src="https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg" alt="The Batman">
                     <span> The Batman </span>
                    </div>   

                    <div class="movie-card"
                    data-title="Dune"
                    data-year="2021"
                    data-genre="Sci-fi / Adventure"
                    data-desc="Paul Atreides måste resa till den farligaste planeten i universum för att säkra sin framtid."
                    data-img="https://image.tmdb.org/t/p/w500/d5NXSklXo0qyIYkgV94XAgMIckC.jpg">
                    <img src="https://image.tmdb.org/t/p/w500/d5NXSklXo0qyIYkgV94XAgMIckC.jpg" alt="Dune">
                     <span>Dune</span>
                    </div>

                    <div class="movie-card"
                    data-title="Joker"
                    data-year="2019"
                    data-genre="Drama / Crime"
                    data-desc="En ensam man i Gotham glider ner i galenskap och blir den ökända Jokern."
                    data-img="https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg">
                    <img src="https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg" alt="Joker">
                     <span>Joker</span>
                    </div>

                    <div class="movie-card"
                    data-title="Avatar"
                    data-year="2009"
                    data-genre="Sci-fi / Adventure"
                    data-desc="En före detta soldat skickas till Pandora och dras in i en kamp om planetens öde."
                    data-img="https://image.tmdb.org/t/p/w500/kyeqWdyUXW608qlYkRqosgbbJyK.jpg">
                    <img src="https://image.tmdb.org/t/p/w500/kyeqWdyUXW608qlYkRqosgbbJyK.jpg" alt="Avatar">
                     <span>Avatar</span>
                    </div>

                </div>
              
        </section>

    </section>

    </main>

            <!-- this div class should be a grid layout with 3 squares -->
            <h2>[chosen filters]</h2>
            <h2>[filter button]</h2>
            <h2>[search button]</h2>
        </div>

        <div class="movie-grid">
            <!-- this div class should contain all visible moovies -->
        </div>
    </div>
 </div>
    <hr>

    <div class="footer">
        <!-- this div class should contain logo pic., contact info. & copyright -->
         <h2>[MSF logo]</h2>
        
         <div class="contact-page">
            <p>[pic] Address</p>
            <p>[pic] Phone Number</p>
            <p>[pic] Email</p>
            <p>FAQ</p>
        </div>

        <h2>[copyright pic]</h2>
    </div>

</body>
</html>
