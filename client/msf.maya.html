<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel= "stylesheet" href="msf.css" />
</head>

<body>
    <section class="front-page">
        <div class="front-overlay"></div>
        <div class=" "front-content>
            <!-- this div class should contain logo pic. & descriptive text -->
            <img src="../images/logo3.png" alt = "MSF logo" class="front-logo">
            
            <h1 class="front-title"> Movie Super Finder</h1>
            <p class=" scroll-down">Scrolla ner</p>
        </div>
    </section>

        
    <section class="home-page">
        <header class="topbar">
                <div class="small-logo">
                    <img src="logo3.png" alt=" MSF logo">
                </div>

                <nav class ="nav-links">
                    <a href="#"> Hem </a> 
                    <a href="#"> Filmer</a>
                    <a href ="#"> Nyheter</a>
                </nav>
    </header>

    <main class="content">
        <section class = "movie-row-section">
            <h2> Populärt just nu</h2>
            <div class="movie-row" > 
                <div class="movie-card"
                    data-title="Interstellar"
                    data-year="2014"
                    data-genre ="Sci-fi /Drama"
                    data-desc = "Ett team reser genom ett maskhål i rymden för att hitta mänsklighetens framtida hem."
                    data-img="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">
                    <img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg" alt=" Interstellar">
                     <span> Interstellar </span>
                </div>
             %%%%%%%%%%%       
            </div>
        </section>
        </section>

    </main>

            <!-- this div class should be a grid layout with 3 squares -->
            <h2>[chosen filters]</h2>
            <h2>[filter button]</h2>
            <h2>[search button]</h2>
        </div>

        <div class="movie-grid">
            <!-- this div class should contain all visible moovies -->
        </div>
    </div>

    <hr>

    <div class="footer">
        <!-- this div class should contain logo pic., contact info. & copyright -->
         <h2>[MSF logo]</h2>
        
         <div class="contact-page">
            <p>[pic] Address</p>
            <p>[pic] Phone Number</p>
            <p>[pic] Email</p>
            <p>FAQ</p>
        </div>

        <h2>[copyright pic]</h2>
    </div>

</body>
